<!-- Tunnel Inputs -->
<div id="tunnelFields" style="display:none;">

<!-- Slope Inputs -->
<div id="slopeFields" style="display:none;">

    <br><br>
    
    <label>Slope Height (m):</label>
    <input type="number" id="slopeHeight">
</div>

<!-- Custom Input -->
<div id="customFields" style="display:none;">
    <label>σ3,max Value (MPa):</label>
    <input type="number" id="sig3max">
</div>

<script>
function toggleFields() {
    let app = document.getElementById("application").value;

    document.getElementById("tunnelFields").style.display = "none";
    document.getElementById("slopeFields").style.display = "none";
    document.getElementById("customFields").style.display = "none";

    if (app === "tunnel") {
        document.getElementById("tunnelFields").style.display = "block";
    }
    else if (app === "slope") {
        document.getElementById("slopeFields").style.display = "block";
    }
    else if (app === "custom") {
        document.getElementById("customFields").style.display = "block";
    }
}
</script>
